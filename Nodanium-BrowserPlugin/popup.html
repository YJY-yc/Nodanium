<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo h2 {
      font-size: 18px;
      color: #0b1a33;
    }
    .logo .badge {
      font-size: 10px;
      background: #e8edf3;
      padding: 2px 8px;
      border-radius: 10px;
      color: #4a6a8b;
    }
    .status-card {
      background: #f8fafc;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
    }
    .status-dot.online {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34,197,94,0.4);
    }
    .status-dot.offline {
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239,68,68,0.4);
    }
    .status-text {
      font-size: 13px;
      color: #1e293b;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: #1a5cff;
      color: white;
    }
    .btn-primary:hover {
      background: #0a4ad0;
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #e8edf3;
      color: #1e293b;
    }
    .btn-secondary:hover {
      background: #d5dce6;
    }
    .btn-danger {
      background: #fee2e2;
      color: #991b1b;
    }
    .btn-danger:hover {
      background: #fecaca;
    }
    .info-text {
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
      margin-top: 12px;
      line-height: 1.6;
    }
    .info-text strong {
      color: #1e293b;
    }
    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 12px 0;
    }
    .manual-input {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .manual-input input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 12px;
    }
    .manual-input input:focus {
      outline: none;
      border-color: #1a5cff;
    }
    .manual-input button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #1a5cff;
      color: white;
      font-weight: 500;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    .manual-input button:hover {
      background: #0a4ad0;
    }
    .manual-input button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h2>⚡ Nodanium</h2>
      <span class="badge">下载拦截器</span>
    </div>

    <div class="status-card">
      <div>
        <span class="status-dot online" id="statusDot"></span>
        <span class="status-text" id="statusText">就绪</span>
      </div>
      <span style="font-size:12px;color:#94a3b8;">v1.0.0</span>
    </div>

    <button class="btn btn-primary" id="testBtn">🔗 测试连接</button>

    <div class="divider"></div>

    <div style="font-size:13px;color:#1e293b;font-weight:500;margin-bottom:8px;">
      📋 手动添加下载
    </div>
    <div class="manual-input">
      <input type="text" id="manualUrl" placeholder="输入下载链接...">
      <button id="sendManualBtn">发送</button>
    </div>

    <div class="divider"></div>

    <button class="btn btn-secondary" id="clearCacheBtn">🗑️ 清除缓存</button>

    <div class="info-text">
      <strong>自动拦截</strong> · 点击下载链接自动转发给 Nodanium<br>
      需要 <strong>Nodanium.exe</strong> 在环境变量中
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
